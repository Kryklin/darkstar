<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" width="100%">
  <style>
    .title-dasp {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 56px;
      font-weight: 900;
      fill: #ffffff;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 4px;
      opacity: 0;
      animation: slideUpFade 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                 pulse 3s ease-in-out 1.4s infinite alternate;
    }
    @keyframes pulse {
      from { opacity: 1; letter-spacing: 4px; }
      to { opacity: 0.6; letter-spacing: 8px; }
    }
    .subtitle {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 22px;
      font-weight: 500;
      fill: #cccccc;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 6px;
      text-transform: uppercase;
      opacity: 0;
      animation: slideUpFade 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.4s;
    }
    @keyframes slideUpFade {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <text x="50%" y="80" class="title-dasp">D-ASP</text>
  <text x="50%" y="140" class="subtitle">Darkstar ARX Substitution Permutation</text>
</svg>
