<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" width="100%">
  <style>
    .title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 38px;
      font-weight: 800;
      fill: #111111;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 2px;
      animation: glow 2s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 2px #aaa, 0 0 4px #aaa, 0 0 6px #888; transform: scale(1); }
      to { text-shadow: 0 0 5px #aaa, 0 0 10px #aaa, 0 0 15px #888; transform: scale(1.01); }
    }
  </style>
  <text x="50%" y="50%" class="title">Darkstar ARX Substitution Permutation</text>
</svg>
