<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%">
  <style>
    .title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 90px;
      font-weight: 900;
      fill: #ffffff;
      text-anchor: middle;
      dominant-baseline: middle;
      animation: pulseGlowDark 4s ease-in-out infinite;
    }
    .glitch-1 {
      fill: #0ff;
      animation: glitchAnim1 3s infinite linear alternate-reverse;
      opacity: 0.8;
      transform: translate(-3px, 1px);
    }
    .glitch-2 {
      fill: #f0f;
      animation: glitchAnim2 2.5s infinite linear alternate-reverse;
      opacity: 0.8;
      transform: translate(3px, -1px);
    }
    @keyframes pulseGlowDark {
      0%, 100% { text-shadow: 0 0 8px rgba(0,255,255,0.3); }
      50% { text-shadow: 0 0 20px rgba(0,255,255,0.7); }
    }
    @keyframes glitchAnim1 {
      0% { clip-path: inset(20% 0 80% 0); transform: translate(-4px, 2px); }
      5% { clip-path: inset(50% 0 30% 0); transform: translate(4px, -2px); }
      10% { clip-path: inset(10% 0 50% 0); transform: translate(-4px, 2px); }
      15% { clip-path: inset(80% 0 5% 0); transform: translate(4px, -2px); }
      20%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
    }
    @keyframes glitchAnim2 {
      0% { clip-path: inset(10% 0 60% 0); transform: translate(4px, -2px); }
      5% { clip-path: inset(40% 0 40% 0); transform: translate(-4px, 2px); }
      10% { clip-path: inset(80% 0 5% 0); transform: translate(4px, -2px); }
      15% { clip-path: inset(5% 0 80% 0); transform: translate(-4px, 2px); }
      20%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
    }
    .ripple-circle {
      transform-origin: 50% 100px;
      animation: rippleShape 3s cubic-bezier(0.25, 1, 0.5, 1) infinite;
    }
    .ripple-circle:nth-child(2) {
      animation-delay: 1.5s;
    }
    @keyframes rippleShape {
      0% { transform: scale(0.8); opacity: 0.3; }
      100% { transform: scale(1.4); opacity: 0; }
    }
  </style>
  
  <ellipse cx="50%" cy="100" rx="300" ry="20" fill="none" stroke="#a0aec0" stroke-width="1" class="ripple-circle" />
  <ellipse cx="50%" cy="100" rx="300" ry="20" fill="none" stroke="#a0aec0" stroke-width="1" class="ripple-circle" />
  
  <text x="50%" y="100" class="title glitch-1">D-SPNA-512</text>
  <text x="50%" y="100" class="title glitch-2">D-SPNA-512</text>
  <text x="50%" y="100" class="title">D-SPNA-512</text>
</svg>
