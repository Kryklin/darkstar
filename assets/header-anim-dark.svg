<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%">
  <style>
    .title {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 80px;
      font-weight: 900;
      fill: #ffffff;
      text-anchor: middle;
      dominant-baseline: middle;
      animation: pulseGlowDark 3s ease-in-out infinite alternate;
    }
    .subtitle {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 28px;
      font-weight: 400;
      fill: #a0aec0;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 8px;
      text-transform: uppercase;
      animation: pulseGlowDarkSub 3s ease-in-out 1s infinite alternate;
    }
    @keyframes pulseGlowDark {
      from { text-shadow: 0 0 5px rgba(255,255,255,0.2); opacity: 0.85; }
      to { text-shadow: 0 0 15px rgba(0,200,255,0.6); opacity: 1; }
    }
    @keyframes pulseGlowDarkSub {
      from { text-shadow: 0 0 2px rgba(255,255,255,0.1); opacity: 0.7; letter-spacing: 8px; }
      to { text-shadow: 0 0 8px rgba(255,255,255,0.3); opacity: 1; letter-spacing: 10px; }
    }
  </style>
  <text x="50%" y="80" class="title">D-ASP</text>
  <text x="50%" y="150" class="subtitle">DARKSTAR ARX SUBSTITUTION PERMUTATION</text>
</svg>
