version: '3.8'

services:
  dasp-rust:
    build:
      context: rust
      dockerfile: Dockerfile
    command: ['test']
    container_name: dasp-rust

  dasp-c:
    build:
      context: c
      dockerfile: Dockerfile
    command: ['test']
    container_name: dasp-c

  dasp-cuda:
    build:
      context: .
      dockerfile: cuda/Dockerfile
    command: ['test']
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    container_name: dasp-cuda

  dasp-builder:
    build:
      context: .
      dockerfile: docker/builder.Dockerfile
    image: dasp-builder:latest
  dasp-node:
    build:
      context: .
      dockerfile: docker/node.Dockerfile
    depends_on:
      - dasp-builder
    command: ['test']
    container_name: dasp-node
  dasp-python:
    build:
      context: .
      dockerfile: docker/python.Dockerfile
    depends_on:
      - dasp-builder
    command: ['test']
    container_name: dasp-python
  dasp-go:
    build:
      context: .
      dockerfile: docker/go.Dockerfile
    depends_on:
      - dasp-builder
    command: ['test']
    container_name: dasp-go
  dasp-ruby:
    build:
      context: .
      dockerfile: docker/ruby.Dockerfile
    depends_on:
      - dasp-builder
    command: ['test']
    container_name: dasp-ruby
  dasp-elixir:
    build:
      context: .
      dockerfile: docker/elixir.Dockerfile
    depends_on:
      - dasp-builder
    command: ['test']
    container_name: dasp-elixir
  dasp-php:
    build:
      context: .
      dockerfile: docker/php.Dockerfile
    depends_on:
      - dasp-builder
    command: ['test']
    container_name: dasp-php
  dasp-csharp:
    build:
      context: .
      dockerfile: docker/csharp.Dockerfile
    depends_on:
      - dasp-builder
    command: ['test']
    container_name: dasp-csharp
  dasp-java:
    build:
      context: .
      dockerfile: docker/java.Dockerfile
    depends_on:
      - dasp-builder
    command: ['test']
    container_name: dasp-java
  dasp-kotlin:
